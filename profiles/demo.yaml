sources:
  - type: FileReplaySource
    params:
      file_path: demo_data.jsonl

  - type: HealthSource
    params:
      source_id: system_health

processors:
  - type: MetricsProcessor
    params:
      window_seconds: 5

  - type: TemporalAggregatorProcessor
    params:
      threshold: 50
      window_seconds: 3 
      min_count: 2
  
  - type: ScoringProcessor
    params:
      base_confidence: 0.5

  - type: FusionGateProcessor
    params:
      min_confidence: 0.65

  - type: CorrelationProcessor
    params: {}

sinks:
  - type: ConsoleSink
  - type: AlertOnlySink
  - type: CorrelatedAlertSink
  - type: ScoredAlertSink